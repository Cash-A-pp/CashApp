<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashApp</title>
    <style>
        /* ===== CSS SEDERHANA ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #2563eb;
            margin-bottom: 5px;
        }

        h2 {
            text-align: center;
            color: #1f2937;
            margin-bottom: 5px;
        }

        h3 {
            text-align: center;
            color: #374151;
            margin-top: 10px;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .email-text {
            text-align: center;
            color: #6b7280;
            margin-bottom: 15px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .btn-danger {
            background: #dc2626;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .btn-secondary {
            background: #6b7280;
        }

        .btn-secondary:hover {
            background: #4b5563;
        }

        .link {
            margin-top: 15px;
            text-align: center;
        }

        .link a {
            color: #2563eb;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }

        .link a:hover {
            text-decoration: underline;
        }

        #saldo {
            text-align: center;
            font-size: 36px;
            color: #16a34a;
            margin: 15px 0;
            font-weight: bold;
        }

        .alert {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .button-group button {
            flex: 1;
        }

        .hidden {
            display: none !important;
        }

        .saldo-update {
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
            margin-top: -10px;
        }

        .profile-info {
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }

        .profile-info p {
            padding: 8px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .profile-info p:last-child {
            border-bottom: none;
        }

        .password-hint {
            font-size: 12px;
            color: #6b7280;
            margin-top: -8px;
            margin-bottom: 12px;
            text-align: center;
        }

        /* Loading sederhana */
        .loading {
            text-align: center;
            padding: 20px;
            color: #6b7280;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card" id="pageContent">
            <!-- Konten diisi oleh JavaScript -->
        </div>
    </div>

    <script>
        // ============================================
        // STATE
        // ============================================
        let currentUser = null;
        let saldoInterval = null;

        // ============================================
        // UTILITY
        // ============================================
        function formatRupiah(angka) {
            return 'Rp ' + Number(angka).toLocaleString('id-ID');
        }

        function showMessage(containerId, message, type) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
        }

        function clearMessage(containerId) {
            const container = document.getElementById(containerId);
            if (container) container.innerHTML = '';
        }

        // ============================================
        // HALAMAN
        // ============================================
        function showLogin() {
            document.getElementById('pageContent').innerHTML = `
                <h1>CashApp</h1>
                <p class="subtitle">Silakan Login</p>
                <div id="loginAlert"></div>
                <form id="loginForm" onsubmit="login(event)">
                    <input type="email" name="email" placeholder="Email" required>
                    <input type="password" name="password" placeholder="Password" required>
                    <button type="submit">LOGIN</button>
                </form>
                <div class="link">
                    Belum punya akun? <a onclick="showRegister()">Register</a>
                </div>
            `;
        }

        function showRegister() {
            document.getElementById('pageContent').innerHTML = `
                <h1>CashApp</h1>
                <p class="subtitle">Daftar Akun Baru</p>
                <div id="registerAlert"></div>
                <form id="registerForm" onsubmit="register(event)">
                    <input type="text" name="name" placeholder="Nama Lengkap" required>
                    <input type="email" name="email" placeholder="Email" required>
                    <input type="password" name="password" placeholder="Password (min. 6 karakter)" required>
                    <div class="password-hint">Password minimal 6 karakter</div>
                    <button type="submit">DAFTAR</button>
                </form>
                <div class="link">
                    Sudah punya akun? <a onclick="showLogin()">Login</a>
                </div>
            `;
        }

        function showDashboard(user) {
            currentUser = user;
            document.getElementById('pageContent').innerHTML = `
                <h2>Dashboard</h2>
                <h3>Halo, ${user.name}!</h3>
                <p class="email-text">${user.email}</p>
                <div id="saldo">${formatRupiah(user.saldo)}</div>
                <p class="saldo-update">Update otomatis tiap 3 detik</p>
                <div class="button-group">
                    <button class="btn-secondary" onclick="showProfile()">Profile</button>
                    <button class="btn-danger" onclick="logout()">Logout</button>
                </div>
            `;
            startSaldoRefresh();
        }

        function showProfile() {
            if (!currentUser) return;
            document.getElementById('pageContent').innerHTML = `
                <h2>Profile</h2>
                <div class="profile-info">
                    <p><strong>Nama:</strong> ${currentUser.name}</p>
                    <p><strong>Email:</strong> ${currentUser.email}</p>
                    <p><strong>Saldo:</strong> ${formatRupiah(currentUser.saldo)}</p>
                </div>
                <div class="button-group">
                    <button class="btn-secondary" onclick="showDashboard(currentUser)">Kembali</button>
                    <button class="btn-danger" onclick="logout()">Logout</button>
                </div>
            `;
        }

        // ============================================
        // API CALLS
        // ============================================
        async function login(event) {
            event.preventDefault();
            const form = document.getElementById('loginForm');
            const data = {
                email: form.email.value,
                password: form.password.value
            };

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                if (result.status === 'success') {
                    showDashboard(result.user);
                } else {
                    showMessage('loginAlert', result.message, 'error');
                }
            } catch (error) {
                showMessage('loginAlert', 'Terjadi kesalahan', 'error');
            }
        }

        async function register(event) {
            event.preventDefault();
            const form = document.getElementById('registerForm');
            const data = {
                name: form.name.value,
                email: form.email.value,
                password: form.password.value
            };

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                if (result.status === 'success') {
                    showMessage('registerAlert', result.message, 'success');
                    setTimeout(showLogin, 1000);
                } else {
                    showMessage('registerAlert', result.message, 'error');
                }
            } catch (error) {
                showMessage('registerAlert', 'Terjadi kesalahan', 'error');
            }
        }

        async function logout() {
            if (!confirm('Yakin logout?')) return;
            await fetch('/api/logout');
            stopSaldoRefresh();
            currentUser = null;
            showLogin();
        }

        async function refreshSaldo() {
            if (!currentUser) return;
            try {
                const res = await fetch('/api/saldo');
                const result = await res.json();
                if (result.status === 'success') {
                    currentUser.saldo = result.saldo;
                    const saldoElement = document.getElementById('saldo');
                    if (saldoElement) {
                        saldoElement.innerHTML = formatRupiah(result.saldo);
                    }
                }
            } catch (error) {
                console.log('Error refresh saldo');
            }
        }

        function startSaldoRefresh() {
            stopSaldoRefresh();
            refreshSaldo();
            saldoInterval = setInterval(refreshSaldo, 3000);
        }

        function stopSaldoRefresh() {
            if (saldoInterval) {
                clearInterval(saldoInterval);
                saldoInterval = null;
            }
        }

        // ============================================
        // CEK SESSION SAAT LOAD
        // ============================================
        async function checkSession() {
            try {
                const res = await fetch('/api/check');
                const result = await res.json();
                if (result.status === 'success') {
                    showDashboard(result.user);
                } else {
                    showLogin();
                }
            } catch (error) {
                showLogin();
            }
        }

        // ============================================
        // JALANKAN
        // ============================================
        checkSession();
        console.log('CashApp Sederhana Siap!');
    </script>

</body>
</html>
